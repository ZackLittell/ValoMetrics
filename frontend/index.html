<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValoMetrics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>ValoMetrics</h1>

    <section>
        <h2>Player Search</h2>
        <input type="text" placeholder="Search player..." id="playerSearch">
        <button onclick="searchPlayer()">Search</button>
    </section>

    <section id="results">
        <h2>Player Results</h2>
        <p>Player stats will appear here.</p>
    </section>

    <section id="charts">
        <h2>Charts and Visualizations</h2>
        <p>Charts will appear here</p>
    </section>

    <section>
        <h2>Team Comparison</h2>

        <input type="text" placeholder="First team..." id="teamOne">
        <input type="text" placeholder="Second team..." id="teamTwo">

        <button onclick="compareTeams()">Compare Teams</button>
    </section>

    <section id="teamResults">
        <h2>Team Comparison Results</h2>
        <p>Team comparison results will appear here.</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
